<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matrícula FATEC</title>
</head>
<body>

    <h1>Formulário de Matrícula - FATEC</h1>

    <form action="#" method="post">
        
        <fieldset>
            <legend>Dados Pessoais</legend>
            
            <p>
                <label for="nome">Nome completo:</label><br>
                <input type="text" id="nome" name="nome" minlength="5" required>
            </p>

            <p>
                <label for="email">Email:</label><br>
                <input type="email" id="email" name="email" required>
            </p>

            <p>
                <label for="nascimento">Data de nascimento:</label><br>
                <input type="date" id="nascimento" name="nascimento">
            </p>

            <p>
                <label for="cpf">CPF (000.000.000-00):</label><br>
                <input type="text" id="cpf" name="cpf" 
                       pattern="\d{3}\.\d{3}\.\d{3}-\d{2}" 
                       title="Digite o CPF no formato 000.000.000-00">
            </p>
        </fieldset>

        <fieldset>
            <legend>Dados Acadêmicos</legend>

            <p>
                <label for="curso">Curso:</label><br>
                <select id="curso" name="curso">
                    <option value="ads">Análise e Desenvolvimento de Sistemas</option>
                    <option value="ge">Gestão Empresarial</option>
                    <option value="dms">Desenvolvimento de Software Multiplataforma</option>
                </select>
            </p>

            <p>
                Período:<br>
                <input type="radio" id="manha" name="periodo" value="manha">
                <label for="manha">Manhã</label>
                
                <input type="radio" id="noite" name="periodo" value="noite">
                <label for="noite">Noite</label>
            </p>

            <p>
                <input type="checkbox" id="programou" name="programou" value="sim">
                <label for="programou">Já programou antes?</label>
            </p>
        </fieldset>

        <p>
            <label for="obs">Observações:</label><br>
            <textarea id="obs" name="obs" rows="4" cols="50"></textarea>
        </p>

        <button type="submit">Enviar Matrícula</button>

    </form>

</body>
</html>
